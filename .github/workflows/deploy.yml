name: Deploy Monorepo to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --- BUILD C++ ---
      - name: Build C++ Platform
        working-directory: ./cpp/c-units-cpp
        run: |
          npm install
          npm run build

      # --- BUILD DSA ---
      - name: Build DSA Platform
        working-directory: ./dsa/dsa-cpp
        run: |
          npm install
          npm run build

      # --- BUILD JAVA ---
      - name: Build Java Platform
        working-directory: ./java/java-units-java
        run: |
          npm install
          npm run build

      # --- MERGE STATIC EXPORTS ---
      - name: Assemble Global Distribution
        run: |
          mkdir -p dist/cpp
          mkdir -p dist/dsa
          mkdir -p dist/java
          cp -r cpp/c-units-cpp/out/* dist/cpp/
          cp -r dsa/dsa-cpp/out/* dist/dsa/
          cp -r java/java-units-java/out/* dist/java/
          
          # Optional: Create a root index.html to redirect users to a specific course
          echo '<meta http-equiv="refresh" content="0; url=/dsa">' > dist/index.html

      # --- DEPLOY TO GITHUB PAGES ---
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
